<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeevika | BalanceBite Assistant</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <h1>Jeevika</h1>
        <p class="subtitle">BalanceBite by Dietician Aakriti</p>

        <div class="block">
          <label for="languageSelect">Language</label>
          <select id="languageSelect">
            <option value="en">English</option>
            <option value="hi">हिन्दी (Hindi)</option>
            <option value="ta">தமிழ் (Tamil)</option>
            <option value="bn">বাংলা (Bengali)</option>
          </select>
        </div>

        <div class="block">
          <h2>Subscription</h2>
          <p id="usageInfo">Free messages left: 20</p>
          <div class="plans">
            <button data-plan="monthly" class="plan-btn">₹100 / month</button>
            <button data-plan="yearly" class="plan-btn">₹1000 / year</button>
          </div>
          <small>Razorpay integration placeholder (account details pending).</small>
        </div>

        <div class="block">
          <h2>Health Reports</h2>
          <input type="file" id="reportInput" accept=".pdf,image/*" />
          <p id="reportStatus">No report uploaded yet.</p>
        </div>

        <div class="block">
          <h2>Diet Plan Generator</h2>
          <label>Days <input type="number" id="dietDays" min="1" max="60" value="7" /></label>
          <label>Condition <input type="text" id="dietCondition" placeholder="e.g. PCOS, diabetes" /></label>
          <label>Meal changes <textarea id="dietMealChanges" placeholder="e.g. replace dinner roti with soup"></textarea></label>
          <button id="downloadPlan">Download Plan (PDF)</button>
        </div>
      </aside>

      <main class="chat-wrapper">
        <header class="chat-header">
          <div>
            <strong>Jeevika Assistant</strong>
            <p>Casual health support • text + voice</p>
          </div>
          <div class="header-actions">
            <button id="callBtn">📞 Call Jeevika</button>
            <button id="notifyBtn">🔔 Daily check-ins</button>
          </div>
        </header>

        <section id="chatArea" class="chat-area"></section>

        <footer class="chat-input-wrap">
          <input id="messageInput" type="text" placeholder="Type a message..." />
          <button id="sendBtn">Send</button>
        </footer>
      </main>
    </div>
  </body>
</html>
